name: CI

on:
  push:
    branches: [main, master]
  # `pull_request:` intentionally omitted. With a self-hosted runner on
  # a public repo, letting fork PRs execute workflows would expose the
  # runner host to arbitrary code. Only branches inside this repo (i.e.
  # commits I push) ever trigger CI. To validate a community PR, pull
  # it locally and push to a branch here.

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: build · fmt · clippy · test
    # Targets the dedicated zmux runner stood up out-of-band
    # (see /mnt/FTY/cirunner-zmux/). Generic self-hosted runners on
    # this host won't claim zmux jobs because they lack the `zmux` label.
    runs-on: [self-hosted, zmux]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo build
        run: cargo build --all-targets

      - name: cargo test
        # Integration tests spin up real daemons + sockets; --test-threads=1
        # avoids the cross-test socket/PID contention that flakes
        # stdio_bridge_recovers_across_daemon_restart under parallel load.
        run: cargo test --all-targets -- --test-threads=1

      - name: cargo doc
        run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings

  fuzz-smoke:
    name: fuzz smoke (rotating seeds)
    runs-on: [self-hosted, zmux]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # The harnesses are deterministic: `cargo test` already re-runs
      # the fixed default seeds in the `check` job. This job walks
      # FRESH seed space on every CI run by deriving the seed from the
      # run number, so coverage accumulates instead of re-checking the
      # same cases forever. A failure prints the exact seed; reproduce
      # locally with ZMUX_VT_FUZZ_SEED=<seed> ZMUX_VT_FUZZ_ITERS=1.
      # Dev profile on purpose — overflow checks are where the
      # arithmetic-panic class actually fires.
      - name: VT ingester fuzz (5k fresh cases)
        run: >
          ZMUX_VT_FUZZ_ITERS=5000
          ZMUX_VT_FUZZ_SEED=$(( 0x51000000 + GITHUB_RUN_NUMBER * 5000 ))
          cargo test --test vt_fuzz -- --nocapture

      - name: layout property tests (2k fresh cases)
        run: >
          ZMUX_LAYOUT_PROP_SEED=$(( 0x52000000 + GITHUB_RUN_NUMBER * 2000 ))
          cargo test --test layout_props -- --nocapture

      - name: input parser fuzz (2k fresh cases)
        run: >
          ZMUX_INPUT_FUZZ_SEED=$(( 0x53000000 + GITHUB_RUN_NUMBER * 2000 ))
          cargo test --test input_fuzz -- --nocapture
