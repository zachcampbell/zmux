name: Release

# Fires on any tag matching v*, e.g. `git tag v0.1.0 && git push --tags`.
# Builds release binaries for the supported targets and attaches them
# to a GitHub Release for the tag.
on:
  push:
    tags: ['v*']

permissions:
  contents: write  # required to create the Release and upload assets

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: [self-hosted, zmux]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset_name: zmux-x86_64-linux-gnu
          - target: x86_64-unknown-linux-musl
            asset_name: zmux-x86_64-linux-musl
            # musl build requires `musl-tools` (provides musl-gcc) on
            # the runner image. Pre-install it in the runner Docker
            # image; the workflow doesn't apt-get (no assumed sudo).

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: cargo build --release
        run: cargo build --release --target ${{ matrix.target }}

      - name: strip + stage binary
        run: |
          strip target/${{ matrix.target }}/release/zmux
          mkdir -p staging
          cp target/${{ matrix.target }}/release/zmux staging/${{ matrix.asset_name }}

      - name: upload asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: staging/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: publish GitHub Release
    needs: build
    runs-on: [self-hosted, zmux]
    steps:
      - uses: actions/checkout@v4  # for the LICENSE / README the release page links to

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: list assets
        run: ls -la dist/

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          # tag_name defaults to the ref that triggered the workflow
          # (the v* tag). draft=false publishes immediately; flip to
          # true if you want to review the page before announcing.
          draft: false
          generate_release_notes: true
          files: dist/*
